services:
  queuestorm:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: queuestorm-investigator:latest
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      HOST: "0.0.0.0"
      LOG_LEVEL: "info"
      WEB_CONCURRENCY: "4"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
